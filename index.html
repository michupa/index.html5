<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR管理システム</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; margin: 0; padding: 20px; background-color: #f4f6f9; color: #333; }
    .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    h1 { font-size: 1.5rem; margin-bottom: 20px; color: #1e3a8a; }
    select { width: 100%; padding: 12px; font-size: 1rem; border-radius: 8px; border: 1px solid #cbd5e1; margin-bottom: 15px; box-sizing: border-box; background-color: #fff; cursor: pointer; font-weight: bold; }
    #reader { width: 100%; border-radius: 8px; overflow: hidden; margin-bottom: 15px; border: 1px solid #e2e8f0; min-height: 250px; background-color: #ebebeb; }
    #status-message { font-size: 1.1rem; font-weight: bold; color: #2563eb; padding: 10px; background: #eff6ff; border-radius: 6px; margin-bottom: 15px; min-height: 24px; }
  </style>
</head>
<body>

<div class="container">
  <h1>物品管理 QRシステム</h1>
  
  <select id="mode-select" onchange="onModeChange()">
    <option value="入庫">① 入庫処理</option>
    <option value="出庫">② 出庫処理</option>
    <option value="配置替え">③ 配置替え処理</option>
    <option value="ロケーション登録">④ ロケーション登録</option>
  </select>

  <div id="status-message">システムを初期化中...</div>
  <div id="reader"></div>
</div>

<script>
  // ★GASのWebアプリURL（固定）
  const API_URL = "https://script.google.com/macros/s/AKfycbxykj9XOMDFVdOhHe5AD_ch5Oa0gY25wi6yDC7q4itLYk4zgNCiWQvRKUR0iB1kdyd3CA/exec";

  let html5QrcodeScanner = null;
  let currentMode = "入庫";
  let step = 1; 
  let isProcessing = false; 

  let dataLog = { location: "", model: "", newLocation: "" };

  function onModeChange() {
    currentMode = document.getElementById("mode-select").value;
    resetFlow();
  }

  function resetFlow() {
    step = 1;
    isProcessing = false;
    dataLog = { location: "", model: "", newLocation: "" };
    updateGuideMessage();
    
    if (html5QrcodeScanner) {
      html5QrcodeScanner.clear().then(() => {
        html5QrcodeScanner = null;
        setTimeout(startScanner, 400);
      }).catch(err => {
        console.log("Scanner clear error, forcing restart...", err);
        html5QrcodeScanner = null;
        setTimeout(startScanner, 400);
      });
    } else {
      setTimeout(startScanner, 400);
    }
  }

  function updateGuideMessage() {
    const msgEl = document.getElementById("status-message");
    if (currentMode === "入庫") {
      msgEl.innerText = step === 1 ? "【入庫】ロケーションをスキャンしてください" : "【入庫】型式をスキャンしてください";
    } else if (currentMode === "出庫") {
      msgEl.innerText = step === 1 ? "【出庫】ロケーションをスキャンしてください" : "【出庫】型式をスキャンしてください";
    } else if (currentMode === "配置替え") {
      if (step === 1) msgEl.innerText = "【配置替え】移動元のロケーションをスキャン";
      else if (step === 2) msgEl.innerText = "【配置替え】製品（型式）をスキャン";
      else msgEl.innerText = "【配置替え】移動先の新ロケーションをスキャン";
    } else if (currentMode === "ロケーション登録") {
      msgEl.innerText = "【登録】新規登録するロケーションをスキャンしてください";
    }
  }

  function onScanSuccess(decodedText) {
    if (isProcessing) return; 
    isProcessing = true; 

    if (html5QrcodeScanner) {
      html5QrcodeScanner.clear().then(() => {
        html5QrcodeScanner = null;
        showConfirmDialog(decodedText);
      }).catch(() => {
        html5QrcodeScanner = null;
        showConfirmDialog(decodedText);
      });
    } else {
      showConfirmDialog(decodedText);
    }
  }

  function showConfirmDialog(decodedText) {
    let confirmMessage = "";
    
    if (currentMode === "入庫") {
      if (step === 1) {
        dataLog.location = decodedText;
        confirmMessage = `入庫先ロケーション: ${decodedText}\n\nこの場所を選択しますか？`;
      } else {
        dataLog.model = decodedText;
        confirmMessage = `型式: ${decodedText}\nロケーション: ${dataLog.location}\n\nこの内容で入庫を確定しますか？`;
      }
    } else if (currentMode === "出庫") {
      if (step === 1) {
        dataLog.location = decodedText;
        confirmMessage = `出庫元ロケーション: ${decodedText}\n\nこの場所から出庫しますか？`;
      } else {
        dataLog.model = decodedText;
        confirmMessage = `型式: ${decodedText}\nロケーション: ${dataLog.location}\n\nこの製品を出庫しますか？`;
      }
    } else if (currentMode === "配置替え") {
      if (step === 1) {
        dataLog.location = decodedText;
        confirmMessage = `移動元ロケーション: ${decodedText}\n\nここから移動しますか？`;
      } else if (step === 2) {
        dataLog.model = decodedText;
        confirmMessage = `型式: ${decodedText}\n\nこの製品を移動しますか？`;
      } else {
        dataLog.newLocation = decodedText;
        confirmMessage = `新ロケーション: ${decodedText}\n\nここに配置を換えますか？`;
      }
    } else if (currentMode === "ロケーション登録") {
      dataLog.location = decodedText;
      confirmMessage = `新規ロケーション: ${decodedText}\n\nこの場所をマスター(D列)に登録しますか？`;
    }

    const userConfirmed = confirm(confirmMessage);

    if (userConfirmed) {
      proceedToNext();
    } else {
      isProcessing = false;
      updateGuideMessage();
      setTimeout(startScanner, 400);       
    }
  }

  function proceedToNext() {
    if (currentMode === "入庫" && step === 1) {
      step = 2;
      isProcessing = false;
      updateGuideMessage();
      setTimeout(startScanner, 400); 
    } else if (currentMode === "出庫" && step === 1) {
      step = 2;
      isProcessing = false;
      updateGuideMessage();
      setTimeout(startScanner, 400); 
    } else if (currentMode === "配置替え" && (step === 1 || step === 2)) {
      step++;
      isProcessing = false;
      updateGuideMessage();
      setTimeout(startScanner, 400); 
    } else {
      sendDataToBackend();
    }
  }

  // ★URLエンコード形式（x-www-form-urlencoded）で確実に送信する関数
  function sendDataToBackend() {
    const msgEl = document.getElementById("status-message");
    msgEl.innerText = "⏳ 通信中...";

    const params = new URLSearchParams();
    params.append("mode", currentMode);
    params.append("location", dataLog.location);
    params.append("model", dataLog.model);
    params.append("newLocation", dataLog.newLocation);

    fetch(API_URL, {
      method: "POST",
      mode: "cors", 
      headers: {
        "Content-Type": "application/x-www-form-urlencoded"
      },
      body: params.toString()
    })
    .then(res => {
      if (!res.ok) throw new Error("Network response was not ok");
      return res.json(); 
    })
    .then(resData => {
      isProcessing = false;

      if (resData.status === "success" || resData.SUCCESS === "SUCCESS") {
        msgEl.style.color = "#16a34a"; 
        msgEl.innerText = "🎉 " + (resData.message || "完了しました！");
        setTimeout(resetFlow, 3000);
      } else {
        msgEl.style.color = "#dc2626"; 
        msgEl.innerText = "⚠️ 制限: " + resData.message;
        setTimeout(resetFlow, 4000);
      }
    })
    .catch(err => {
      console.error(err);
      isProcessing = false;
      msgEl.style.color = "#dc2626";
      msgEl.innerText = "❌ 通信エラーが発生しました。もう一度お試しください。";
      setTimeout(resetFlow, 4000);
    });
  }

  function startScanner() {
    if (html5QrcodeScanner) return;
    try {
      const msgEl = document.getElementById("status-message");
      if(msgEl.innerText === "システムを初期化中...") updateGuideMessage();
      
      html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250, rememberLastUsedCamera: true });
      html5QrcodeScanner.render(onScanSuccess);
    } catch (e) {
      console.log("Scanner init error, retrying...", e);
    }
  }

  window.onload = () => { resetFlow(); };
</script>

</body>
</html>
