<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR管理システム</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; margin: 0; padding: 20px; background-color: #f4f6f9; color: #333; }
    .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    h1 { font-size: 1.5rem; margin-bottom: 20px; color: #1e3a8a; }
    select, button { width: 100%; padding: 12px; font-size: 1rem; border-radius: 8px; border: 1px solid #cbd5e1; margin-bottom: 15px; box-sizing: border-box; }
    select { background-color: #fff; cursor: pointer; font-weight: bold; }
    #reader { width: 100%; border-radius: 8px; overflow: hidden; margin-bottom: 15px; border: 1px solid #e2e8f0; }
    #status-message { font-size: 1.1rem; font-weight: bold; color: #2563eb; padding: 10px; background: #eff6ff; border-radius: 6px; margin-bottom: 15px; min-height: 24px; }
    .btn-action { background-color: #2563eb; color: white; border: none; font-weight: bold; cursor: pointer; display: none; }
    .btn-action:hover { background-color: #1d4ed8; }
  </style>
</head>
<body>

<div class="container">
  <h1>物品管理 QRシステム</h1>
  
  <select id="mode-select" onchange="onModeChange()">
    <option value="入庫">① 入庫処理</option>
    <option value="出庫">② 出庫処理</option>
    <option value="配置替え">③ 配置替え処理</option>
    <option value="ロケーション登録">④ ロケーション登録</option>
  </select>

  <div id="status-message">モードを選択してください</div>

  <div id="reader"></div>

</div>

<script>
  // 💡 ここに新しくデプロイして取得した最新のGASウェブアプリURLを貼り付けてください
  const API_URL = "https://script.google.com/macros/s/AKfycbyhdcmQLKhYPVl1Z1sClcQUyM2QX8HH4KldgGIP7Pz2NYwXHhlD12P_tliWcBm1Vmbdcw/exec";

  let html5QrcodeScanner;
  let currentMode = "入庫";
  let step = 1; 
  let lastScannedText = "";

  // 各種データを一時保持する変数
  let dataLog = {
    location: "",
    model: "",
    newLocation: ""
  };

  function onModeChange() {
    currentMode = document.getElementById("mode-select").value;
    resetFlow();
  }

  function resetFlow() {
    step = 1;
    lastScannedText = "";
    dataLog = { location: "", model: "", newLocation: "" };
    updateGuideMessage();
    
    if (html5QrcodeScanner) {
      html5QrcodeScanner.clear().then(() => {
        setTimeout(startScanner, 300);
      }).catch(() => {
        startScanner();
      });
    } else {
      startScanner();
    }
  }

  function updateGuideMessage() {
    const msgEl = document.getElementById("status-message");
    if (currentMode === "入庫") {
      msgEl.innerText = step === 1 ? "【入庫】ロケーションを読み込んでください" : "【入庫】型式を読み込んでください";
    } else if (currentMode === "出庫") {
      msgEl.innerText = step === 1 ? "【出庫】ロケーションを読み込んでください" : "【出庫】型式を読み込んでください";
    } else if (currentMode === "配置替え") {
      if (step === 1) msgEl.innerText = "【配置替え】元ロケーションを読み込んでください";
      else if (step === 2) msgEl.innerText = "【配置替え】製品（型式）を読み込んでください";
      else msgEl.innerText = "【配置替え】新ロケーションを読み込んでください";
    } else if (currentMode === "ロケーション登録") {
      msgEl.innerText = "【登録】登録するロケーションを読み込んでください";
    }
  }

  function onScanSuccess(decodedText) {
    if (decodedText === lastScannedText) return;
    lastScannedText = decodedText;

    // スキャナーをクリアしてからダイアログを出す（カメラの競合を防ぐ）
    if (html5QrcodeScanner) {
      html5QrcodeScanner.clear().then(() => {
        showConfirmDialog(decodedText);
      }).catch(() => {
        showConfirmDialog(decodedText);
      });
    } else {
      showConfirmDialog(decodedText);
    }
  }

  function showConfirmDialog(decodedText) {
    let confirmMessage = "";
    if (currentMode === "入庫") {
      if (step === 1) {
        dataLog.location = decodedText;
        confirmMessage = `ロケーション確認: ${decodedText}\n\nこのロケーションに登録しますか？`;
      } else {
        dataLog.model = decodedText;
        confirmMessage = `型式確認: ${decodedText}\n\nこの型式を入庫しますか？`;
      }
    } else if (currentMode === "出庫") {
      if (step === 1) {
        dataLog.location = decodedText;
        confirmMessage = `出荷元ロケーション: ${decodedText}\n\nこのロケーションの製品を出荷しますか？`;
      } else {
        dataLog.model = decodedText;
        confirmMessage = `型式確認: ${decodedText}\n\n出荷しますか？`;
      }
    } else if (currentMode === "配置替え") {
      if (step === 1) {
        dataLog.location = decodedText;
        confirmMessage = `移動元ロケーション: ${decodedText}\n\nこのロケーションから移動しますか？`;
      } else if (step === 2) {
        dataLog.model = decodedText;
        confirmMessage = `移動製品（型式）: ${decodedText}\n\nこの製品を移動しますか？`;
      } else {
        dataLog.newLocation = decodedText;
        confirmMessage = `移動先ロケーション: ${decodedText}\n\nここに配置を換えますか？`;
      }
    } else if (currentMode === "ロケーション登録") {
      dataLog.location = decodedText;
      confirmMessage = `新規ロケーション: ${decodedText}\n\nこの内容を登録しますか？`;
    }

    const userConfirmed = confirm(confirmMessage);

    if (userConfirmed) {
      proceedToNext();
    } else {
      lastScannedText = ""; 
      updateGuideMessage();
      setTimeout(startScanner, 300);       
    }
  }

  function proceedToNext() {
    if (currentMode === "入庫") {
      if (step === 1) {
        step = 2;
        lastScannedText = "";
        updateGuideMessage();
        // 前のカメラ終了を待って確実に型式スキャンを起動する（不具合①の対策）
        setTimeout(startScanner, 500); 
      } else {
        sendDataToBackend();
      }
    } else if (currentMode === "出庫") {
      if (step === 1) {
        step = 2;
        lastScannedText = "";
        updateGuideMessage();
        setTimeout(startScanner, 500); 
      } else {
        sendDataToBackend();
      }
    } else if (currentMode === "配置替え") {
      if (step === 1 || step === 2) {
        step++;
        lastScannedText = "";
        updateGuideMessage();
        setTimeout(startScanner, 500); 
      } else {
        sendDataToBackend();
      }
    } else if (currentMode === "ロケーション登録") {
      sendDataToBackend();
    }
  }

  function sendDataToBackend() {
    const msgEl = document.getElementById("status-message");
    msgEl.innerText = "通信中...";

    fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        mode: currentMode,
        location: dataLog.location,
        model: dataLog.model,
        newLocation: dataLog.newLocation
      })
    })
    .then(res => res.json())
    .then(resData => {
      if (resData.status === "success") {
        msgEl.innerText = resData.message || "処理が完了しました！";
        setTimeout(resetFlow, 3000);
      } else {
        msgEl.innerText = "⚠️ 警告: " + resData.message;
        setTimeout(() => {
          lastScannedText = "";
          updateGuideMessage();
          setTimeout(startScanner, 500);
        }, 4000);
      }
    })
    .catch(err => {
      console.error(err);
      msgEl.innerText = "通信エラーが発生しました。GASの新しいデプロイとURLを確認してください。";
      setTimeout(resetFlow, 4000);
    });
  }

  function startScanner() {
    html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 12, qrbox: 250 });
    html5QrcodeScanner.render(onScanSuccess);
  }

  window.onload = () => { resetFlow(); };
</script>

</body>
</html>
